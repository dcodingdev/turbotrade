worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimization for performance
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20M; # Allow file uploads

    # Global Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;

        # ---------------- API SERVICES ----------------
        # We point to the service name and internal port defined in docker-compose
        
        location /api/auth/ {
            proxy_pass http://auth-service:4001;
        }

        location /api/products/ {
            proxy_pass http://product-service:4002;
        }

        location /api/orders/ {
            proxy_pass http://order-service:4003;
        }

        location /api/payments/ {
            proxy_pass http://payment-service:4004;
        }

        location /api/email/ {
            proxy_pass http://email-service:4005;
        }

        # ---------------- WEBSOCKET (Chat) ----------------
        location /api/chat/ {
            proxy_pass http://chat-service:4006;
            
            # WebSocket specific headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        # ---------------- FRONTEND DASHBOARDS ----------------
        # For SPAs, we proxy to the service. 
        # Routing logic (index.html) should be handled by the service itself.
        
        # location /vendor/ {
        #     proxy_pass http://vendor-dashboard:3001; 
        # }

        # location /admin/ {
        #     proxy_pass http://admin-panel:3002;
        # }

        # # ---------------- NEXT.JS (Main Web) ----------------
        # location / {
        #     proxy_pass http://customer-web:3000;
        # }
    }
}