worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    map $http_origin $cors_origin {
        default "$http_origin";
        ""      "http://localhost:3000";
    }

    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"UP","gateway":"nginx"}';
        }

        # Global CORS variables
        set $cors_credentials 'true';
        set $cors_methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH';
        set $cors_headers $http_access_control_request_headers;

        if ($cors_headers = "") {
            set $cors_headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        }

        # ================= AUTH SERVICE =================

        location /api/v1/auth {
            set $auth_upstream http://auth-service:4001;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
                add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
                add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
                add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
            add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
            add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;

            rewrite ^/api/v1/auth/?(.*) /api/auth/$1 break;
            proxy_pass $auth_upstream;
        }

        location = /api/v1/auth/me {

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;

            rewrite ^/api/v1/auth/me$ /api/users/profile break;
            proxy_pass http://auth-service:4001;
        }

        # ================= USERS SERVICE =================

        location /api/v1/users {

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
                add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
                add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
                add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
            add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
            add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;

            rewrite ^/api/v1/users/?(.*) /api/users/$1 break;
            proxy_pass http://auth-service:4001;
        }

        # ================= PRODUCT SERVICE =================

        location /api/v1/products {
            set $product_upstream http://product-service:4002;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
                add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
                add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
                add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
            add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
            add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;

            rewrite ^/api/v1/products/?(.*) /api/products/$1 break;
            proxy_pass $product_upstream;
        }

        # ================= ORDER SERVICE =================

        location /api/v1/orders {

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
                add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
                add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
                add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
            add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
            add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;

            rewrite ^/api/v1/orders/?(.*) /api/orders/$1 break;
            proxy_pass http://order-service:4003;
        }

        # ================= PAYMENT SERVICE =================

        location /api/v1/payments {

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
                add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
                add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
                add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
            add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
            add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;

            rewrite ^/api/v1/payments/?(.*) /api/payments/$1 break;
            proxy_pass http://payment-service:4004;
        }

        # ================= EMAIL SERVICE =================

        location /api/v1/email {

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
                add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
                add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
                add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
            add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
            add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;

            rewrite ^/api/v1/email/?(.*) /api/email/$1 break;
            proxy_pass http://email-service:4005;
        }

        # ================= CHAT SERVICE =================

        location /api/v1/chat {

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
                add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
                add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
                add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      "$cors_origin"      always;
            add_header 'Access-Control-Allow-Credentials' "$cors_credentials" always;
            add_header 'Access-Control-Allow-Methods'     "$cors_methods"     always;
            add_header 'Access-Control-Allow-Headers'     "$cors_headers"     always;

            rewrite ^/api/v1/chat/?(.*) /api/chat/$1 break;
            proxy_pass http://chat-service:4006;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}