services:
  # API Gateway
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      -  ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
      - email-service
      - chat-service

  # Microservices
  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - MONGO_URI=mongodb+srv://kadakiadev2806_db_user:dkadmin@cluster0.1vtedpe.mongodb.net/auth_db?appName=Cluster0
    depends_on:
      - redis
      - rabbitmq

  product-service:
    build: 
      context: ../../
      dockerfile: services/product-service/Dockerfile
    container_name: product-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - MONGO_URI=mongodb+srv://user:pass@cluster.mongodb.net/product_db

  order-service:
    build:
      context: ../../
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - MONGO_URI=mongodb+srv://user:pass@cluster.mongodb.net/order_db

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - MONGO_URI=mongodb+srv://user:pass@cluster.mongodb.net/payment_db


  chat-service:
    build:
      context: ../../
      dockerfile: services/chat-service/Dockerfile
    container_name: chat-service
    ports:
      - "4006:4006"
    environment:
      - PORT=4006

  # Redis for Caching/Chat
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # RabbitMQ for Service Communication
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # Standard Port
      - "15672:15672" # Management UI Port
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  # Example of an updated Microservice with Dependencies
  email-service:
    build:
      context: ../../
      dockerfile: services/email-service/Dockerfile
    container_name: email-service
    ports:
      - "4005:4005"
    depends_on:
      - rabbitmq
    environment:
      - PORT=4005
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672