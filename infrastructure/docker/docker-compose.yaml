version: '3.8'

services:
  # --- API Gateway ---
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
      - email-service
      - chat-service
    networks:
      - app-network

  # --- Microservices (Dev Mode) ---
  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile.dev
    container_name: auth-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/auth-service/node_modules
      - /app/packages/api-contracts/node_modules
      - /app/packages/common/node_modules
      - /app/packages/config/node_modules
      - /app/packages/database/node_modules
      - /app/packages/image-storage/node_modules
      - /app/packages/logger/node_modules
      - /app/packages/rabbitmq/node_modules
      - /app/packages/types/node_modules
      - /app/packages/ui/node_modules
    environment:
      - AUTH_PORT=4001
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - AUTH_MONGO_URI=${AUTH_DB_URI}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CLIENT_URL=${CLIENT_URL}
    networks:
      - app-network

  product-service:
    build:
      context: ../../
      dockerfile: services/product-service/Dockerfile.dev
    container_name: product-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/product-service/node_modules
      - /app/packages/api-contracts/node_modules
      - /app/packages/common/node_modules
      - /app/packages/config/node_modules
      - /app/packages/database/node_modules
      - /app/packages/image-storage/node_modules
      - /app/packages/logger/node_modules
      - /app/packages/rabbitmq/node_modules
      - /app/packages/types/node_modules
      - /app/packages/ui/node_modules
    environment:
      - PRODUCT_PORT=4002
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PRODUCT_MONGO_URI=${PRODUCT_DB_URI}
      - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
      - CLIENT_URL=${CLIENT_URL}
    networks:
      - app-network

  order-service:
    build:
      context: ../../
      dockerfile: services/order-service/Dockerfile.dev
    container_name: order-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/order-service/node_modules
      - /app/packages/api-contracts/node_modules
      - /app/packages/common/node_modules
      - /app/packages/config/node_modules
      - /app/packages/database/node_modules
      - /app/packages/image-storage/node_modules
      - /app/packages/logger/node_modules
      - /app/packages/rabbitmq/node_modules
      - /app/packages/types/node_modules
      - /app/packages/ui/node_modules
    environment:
      - ORDER_PORT=4003
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ORDER_MONGO_URI=${ORDER_DB_URI}
      - CLIENT_URL=${CLIENT_URL}
    networks:
      - app-network

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile.dev
    container_name: payment-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/payment-service/node_modules
      - /app/packages/api-contracts/node_modules
      - /app/packages/common/node_modules
      - /app/packages/config/node_modules
      - /app/packages/database/node_modules
      - /app/packages/image-storage/node_modules
      - /app/packages/logger/node_modules
      - /app/packages/rabbitmq/node_modules
      - /app/packages/types/node_modules
      - /app/packages/ui/node_modules
    environment:
      - PAYMENT_PORT=4004
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PAYMENT_MONGO_URI=${PAYMENT_DB_URI}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - CLIENT_URL=${CLIENT_URL}
    networks:
      - app-network

  email-service:
    build:
      context: ../../
      dockerfile: services/email-service/Dockerfile.dev
    container_name: email-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/email-service/node_modules
    environment:
      - PORT=4005
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - app-network

  chat-service:
    build:
      context: ../../
      dockerfile: services/chat-service/Dockerfile.dev
    container_name: chat-service-dev
    command: sh -c "pnpm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/services/chat-service/node_modules
    environment:
      - CHAT_PORT=4006
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - CHAT_MONGO_URI=${CHAT_DB_URI}
    networks:
      - app-network

  # --- Infrastructure ---
  redis:
    image: redis:alpine
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - app-network

networks:
  app-network:
    driver: bridge